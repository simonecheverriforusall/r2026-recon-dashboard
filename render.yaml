# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: r2026-recon-dashboard
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        value: R2026
      - key: REQUIRE_AUTH
        value: "true"
      - key: ALLOWED_EMAIL_DOMAIN
        value: forusall.com
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SNOWFLAKE_ENABLED
        sync: false
      - key: SNOWFLAKE_ACCOUNT
        sync: false
      - key: SNOWFLAKE_USER
        sync: false
      - key: SNOWFLAKE_WAREHOUSE
        sync: false
      - key: SNOWFLAKE_ROLE
        sync: false
      - key: SNOWFLAKE_DATABASE
        sync: false
      - key: SNOWFLAKE_SCHEMA
        sync: false
      - key: SNOWFLAKE_PRIVATE_KEY_BASE64
        sync: false
      - key: SNOWFLAKE_PRIVATE_KEY_PASSPHRASE
        sync: false
      - key: DRIVE_API_KEY
        sync: false
      - key: DRIVE_PARENT_FOLDER_ID
        sync: false
      - key: DRIVE_COMM_REQUIRED_PATTERN
        sync: false
      - key: RECON_YEAR
        value: "2026"
      - key: COMMUNICATIONS_DRY_RUN
        value: "true"
      - key: DEVREV_ENABLED
        sync: false
      - key: DEVREV_API_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: COMMS_USE_SUPABASE
        value: "true"
      - key: COMMS_CACHE_TTL_HOURS
        value: "6"
      - key: COMMS_SYNC_SECRET
        sync: false
