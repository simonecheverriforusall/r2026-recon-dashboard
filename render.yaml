# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: r2026-recon-dashboard
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        value: R2026
      - key: REQUIRE_AUTH
        value: "true"
      - key: ALLOWED_EMAIL_DOMAIN
        value: forusall.com
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
